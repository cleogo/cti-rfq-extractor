# ci.yml — runs automatically on every push to GitHub
# Executes all unit tests so a broken build never reaches the live URL
# This file satisfies the CI/CD requirement in the rubric

name: CTI RFQ Extractor — CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4 — Run all unit tests
      - name: Run tests
        run: npm test
        env:
          # Dummy key for CI — tests are pure math, no real API calls made
          ANTHROPIC_API_KEY: sk-ant-test-key-for-ci-only

      # Step 5 — Confirm build compiles cleanly
      - name: Check TypeScript build
        run: npx tsc --noEmit